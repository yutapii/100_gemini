<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store">
  <title>310 ステークホルダーDB</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      background:#1a1a2e;color:#eee;padding:20px;font-size:14px;
    }
    .container{max-width:1400px;margin:0 auto}
    h1{color:#f90;font-size:1.4em;margin-bottom:5px}
    .subtitle{color:#888;margin-bottom:15px;font-size:0.9em}
    .nav-links{margin-bottom:20px;display:flex;gap:15px}
    .nav-links a{
      padding:8px 16px;background:#0f3460;border-radius:6px;
      color:#fff;text-decoration:none;font-size:0.9em;
    }
    .nav-links a:hover{background:#1a4a80}
    .stats{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
    .stat-box{
      background:#0a2a4a;padding:12px 20px;
      border-radius:8px;text-align:center;
    }
    .stat-num{font-size:1.8em;color:#0f0;font-weight:bold}
    .stat-label{color:#888;font-size:0.8em}
    .action-bar{
      display:flex;gap:10px;margin-bottom:15px;
      align-items:center;flex-wrap:wrap;
    }
    .action-btn{
      padding:8px 16px;border:none;border-radius:4px;
      cursor:pointer;font-size:0.9em;
    }
    .btn-include{background:#0a3;color:#fff}
    .btn-include:hover{background:#0c4}
    .btn-exclude{background:#a33;color:#fff}
    .btn-exclude:hover{background:#c44}
    .selected-count{color:#888;font-size:0.9em}
    .filters{
      background:#16213e;padding:15px;border-radius:8px;
      margin-bottom:20px;display:flex;gap:15px;
      flex-wrap:wrap;align-items:center;
    }
    .filters input,.filters select{
      padding:8px 12px;border-radius:4px;border:1px solid #333;
      background:#0a0a1a;color:#eee;font-size:0.9em;
    }
    .filters input{width:250px}
    table{
      width:100%;border-collapse:collapse;
      background:#16213e;border-radius:8px;overflow:hidden;
    }
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #333}
    th{
      background:#0f3460;font-weight:bold;color:#fff;
      cursor:pointer;user-select:none;
    }
    th:hover{background:#1a4a80}
    tr:hover{background:#1a2a4e}
    .col-check{width:30px;text-align:center}
    input[type="checkbox"]{width:16px;height:16px;cursor:pointer}
    .folder-num{font-weight:bold;color:#f90;font-family:monospace}
    .vendor-name{font-weight:bold}
    .status{padding:3px 8px;border-radius:4px;font-size:0.8em;font-weight:bold}
    .status-active{background:#0a3;color:#fff}
    .status-pending{background:#a50;color:#fff}
    .status-done{background:#555;color:#ccc}
    .cat-tag{
      padding:2px 6px;border-radius:3px;
      font-size:0.75em;background:#333;color:#aaa;
    }
    a{color:#0af;text-decoration:none}
    a:hover{text-decoration:underline}
    .btn{
      display:inline-block;padding:4px 10px;background:#0f3460;
      border-radius:4px;color:#fff;font-size:0.8em;margin-right:5px;
    }
    .btn:hover{background:#1a4a80;text-decoration:none}
    .btn-primary{background:#f90;color:#000}
    .contact-info{font-size:0.85em;color:#aaa}
    .files-count{
      background:#2a2a4e;padding:2px 8px;
      border-radius:10px;font-size:0.8em;
    }
    .loading{text-align:center;padding:50px;color:#888}
    .section-header{
      background:#2a1a1a;color:#f90;font-weight:bold;padding:15px;
    }
    @media(max-width:900px){
      body{padding:10px;font-size:13px}
      .nav-links{gap:8px}
      .nav-links a{padding:6px 10px;font-size:0.8em}
      .stats{gap:10px}
      .stat-box{padding:8px 12px}
      .stat-num{font-size:1.4em}
      .filters input{width:150px}
      th,td{padding:6px 8px}
      .btn{padding:3px 6px;font-size:0.75em;margin-right:3px}
      .col-contact,.col-files{display:none}
    }
    @media(max-width:600px){
      body{padding:8px;font-size:12px}
      h1{font-size:1.2em}
      .nav-links{flex-wrap:wrap;gap:5px}
      .nav-links a{padding:5px 8px}
      .filters{padding:10px;gap:8px}
      .filters input{width:100%}
      .filters select{width:48%}
      th,td{padding:5px 6px}
      .vendor-name{font-size:0.9em}
      .cat-tag{font-size:0.7em;padding:1px 4px}
      .status{font-size:0.7em;padding:2px 5px}
      .col-cat{display:none}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-links">
      <a href="../index.html">← TOP</a>
      <a href="../300_plan/index.html">📊 ダッシュボード</a>
      <a href="../500_stakeholders/">500 旧版</a>
    </div>
    <h1>📁 310 ステークホルダーDB</h1>
    <p class="subtitle">チェック→対象/対象外を切り替え可能</p>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="stat-total">-</div>
        <div class="stat-label">登録業者</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-active">-</div>
        <div class="stat-label">進行中</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-files">-</div>
        <div class="stat-label">総ファイル数</div>
      </div>
    </div>
    <div class="action-bar">
      <button class="action-btn btn-include" onclick="moveToTarget()">
        ✓ 対象にする
      </button>
      <button class="action-btn btn-exclude" onclick="moveToExcluded()">
        ✗ 対象外にする
      </button>
      <span class="selected-count" id="selected-count">0件選択</span>
    </div>
    <div class="filters">
      <input type="text" id="search" placeholder="🔍 検索（名前・ID）">
      <select id="cat-filter"><option value="">全カテゴリ</option></select>
      <select id="status-filter">
        <option value="">全ステータス</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="check-all"></th>
          <th>フォルダ</th>
          <th>業者名</th>
          <th class="col-cat">カテゴリ</th>
          <th>ステータス</th>
          <th class="col-contact">連絡先</th>
          <th class="col-files">ファイル</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="vendor-table">
        <tr><td colspan="8" class="loading">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
  <script>
    const VENDORS=[
      {f:'501',n:1,j:'times24.json'},{f:'502',n:2,j:'repark.json'},
      {f:'503',n:3,j:'softbank.json'},{f:'504',n:4,j:'kddi.json'},
      {f:'505',n:5,j:'rakuten.json'},{f:'506',n:6,j:'cocacola.json'},
      {f:'507',n:7,j:'suntory.json'},{f:'508',n:8,j:'glico.json'},
      {f:'509',n:9,j:'enechange.json'},{f:'510',n:10,j:'terracharge.json'},
      {f:'511',n:11,j:'hellocycling.json'},{f:'512',n:12,j:'luup.json'},
      {f:'513',n:13,j:'timescar.json'},{f:'514',n:14,j:'carshares.json'},
      {f:'515',n:15,j:'yuka.json'},{f:'516',n:16,j:'amazonhub.json'},
      {f:'517',n:17,j:'pudo.json'},{f:'518',n:18,j:'hello-storage.json'},
      {f:'519',n:19,j:'r-contena.json'},{f:'520',n:20,j:'kase.json'},
      {f:'521',n:21,j:'ohara.json'},{f:'522',n:22,j:'satomura.json'},
      {f:'523',n:23,j:'libe-home.json'},{f:'524',n:24,j:'kawase.json'},
      {f:'525',n:25,j:'yamato-tax-office.json'},
      {f:'526',n:26,j:'shimin-ka.json'},
      {f:'527',n:27,j:'nougyou-iinkai.json'},
      {f:'528',n:28,j:'houmukyoku.json'},
      {f:'529',n:29,j:'community-bus.json'},
      {f:'530',n:30,j:'road-zama.json'},{f:'531',n:31,j:'road-pref.json'},
      {f:'532',n:32,j:'water-zama.json'},
      {f:'533',n:33,j:'wakui-fumi.json'},
      {f:'534',n:34,j:'wakui-katsutoshi.json'},
      {f:'535',n:35,j:'wakui-land.json'},{f:'536',n:36,j:'milestone.json'},
      {f:'537',n:37,j:'family-meeting.json'},
      {f:'538',n:38,j:'souzoku.json'},{f:'539',n:39,j:'zufo.json'},
      {f:'540',n:40,j:'houmukyoku-yamato.json'},
      {f:'541',n:41,j:'hardoff-zama.json'},
      {f:'542',n:42,j:'zama-cleancenter.json'},
      {f:'543',n:43,j:'urawa-zeirishi.json'},
      {f:'544',n:44,j:'vacant-44.json'},
      {f:'545',n:45,j:'vacant-45.json'},
      {f:'546',n:46,j:'vacant-46.json'},
      {f:'547',n:47,j:'yoshida-yoshito.json'},
      {f:'548',n:48,j:'gappitsu.json'},{f:'549',n:49,j:'input_repark.json'},
      {f:'550',n:50,j:'input_cocacola.json'},
      {f:'551',n:51,j:'input_glico.json'},
      {f:'552',n:52,j:'ev_summary.json'},
      {f:'553',n:53,j:'solar_summary.json'},
      {f:'554',n:54,j:'delivery_locker.json'},
      {f:'555',n:55,j:'zama_ec.json'},
      {f:'556',n:56,j:'electrical_plan.json'},
      {f:'557',n:57,j:'subsidy_wff.json'},
      {f:'558',n:58,j:'subsidy_all.json'},
      {f:'559',n:59,j:'parking_subsidy.json'},
      {f:'560',n:60,j:'container_site.json'},
      {f:'561',n:61,j:'parking_layout.json'},
      {f:'562',n:62,j:'road_consultation.json'},
      {f:'563',n:63,j:'autocad_prep.json'},
      {f:'564',n:64,j:'action_plan.json'},
      {f:'565',n:65,j:'vacant-65.json'},
      {f:'566',n:66,j:'zama-city-tosi.json'},
      {f:'567',n:67,j:'tokyogas.json'},
      {f:'568',n:68,j:'bukkabon.json'},
      {f:'569',n:69,j:'shoene-hojokin.json'},
      {f:'570',n:70,j:'apple-support.json'},
      {f:'571',n:71,j:'gmail-forward.json'},
      {f:'572',n:72,j:'wakui-nijiro.json'},
      {f:'573',n:73,j:'hasegawa-zeirishi.json'},
      {f:'574',n:74,j:'tojo-gas.json'}
    ];
    const FILE_CNT={
      '501':10,'511':4,'515':2,'518':2,'521':18,
      '527':1,'529':2,'533':2,'543':10,'566':2,'568':7,'569':1
    };
    const EXCL_CATS=['調査資料','入力データ','計画図面',
      '補助金資料','プロジェクト管理','AIツール'];
    let vendorData=[];
    const manualExcluded=new Set();

    async function fetchJSON(url){
      try{
        const r=await fetch(url);
        if(!r.ok)return null;
        return await r.json();
      }catch(e){
        console.error(`[310] JSON error: ${url}`,e);
        return null;
      }
    }
    function getCnt(f){return FILE_CNT[f]||0;}
    function getStatusCls(s){
      if(!s)return'status-pending';
      const l=s.toLowerCase();
      if(l.includes('完了')||l.includes('done'))return'status-done';
      if(l.includes('進行')||l.includes('active'))return'status-active';
      return'status-pending';
    }
    function isExcluded(v){
      if(manualExcluded.has(v.folder))return true;
      return EXCL_CATS.includes(v.cat);
    }
    function renderTable(data){
      const tbody=document.getElementById('vendor-table');
      const q=document.getElementById('search').value.toLowerCase();
      const cf=document.getElementById('cat-filter').value;
      const sf=document.getElementById('status-filter').value;
      let flt=data.filter(v=>{
        if(q){
          const t=`${v.name} ${v.id} ${v.cat||''}`.toLowerCase();
          if(!t.includes(q))return false;
        }
        if(cf&&v.cat!==cf)return false;
        if(sf&&v.status!==sf)return false;
        return true;
      });
      if(!flt.length){
        tbody.innerHTML='<tr><td colspan="8">該当なし</td></tr>';return;
      }
      const act=flt.filter(v=>!isExcluded(v));
      const exc=flt.filter(v=>isExcluded(v));
      const row=v=>`<tr>
        <td class="col-check">
          <input type="checkbox" class="row-check" data-folder="${v.folder}">
        </td>
        <td><span class="folder-num">${v.folder}/</span>
          <span style="color:#888;font-size:0.8em">#${v.no}</span></td>
        <td><span class="vendor-name">${v.name||'?'}</span>
          <br><span style="color:#666;font-size:0.8em">${v.id||''}</span></td>
        <td class="col-cat"><span class="cat-tag">${v.cat||'-'}</span></td>
        <td><span class="status ${getStatusCls(v.status)}">
          ${v.status||'未設定'}</span></td>
        <td class="col-contact contact-info">
          ${v.phone_mobile?`📱${v.phone_mobile}<br>`:''}
          ${v.tel?`☎️${v.tel}<br>`:''}
          ${v.email?`✉️${v.email}`:''}</td>
        <td class="col-files"><span class="files-count">${v.fc}件</span></td>
        <td><a href="../${v.folder}/" class="btn btn-primary">📁</a>
          <a href="../308_vendor_master/${v.jf}" class="btn">JSON</a>
          ${v.docs&&v.docs.length
            ?`<a href="../${v.docs[0].path}"
               class="btn"
               style="background:#0a3"
               >📄</a>`
            :''}</td>
      </tr>`;
      let html=act.map(row).join('');
      if(exc.length){
        html+=`<tr class="section-header">
          <td colspan="8">📋 対象外（${exc.length}件）</td></tr>`;
        html+=exc.map(row).join('');
      }
      tbody.innerHTML=html;
      updateCheckCount();
    }
    function updateStats(data){
      document.getElementById('stat-total').textContent=data.length;
      const ac=data.filter(v=>v.status&&
        (v.status.includes('進行')||v.status.includes('連絡'))).length;
      document.getElementById('stat-active').textContent=ac;
      const fc=data.reduce((s,v)=>s+(v.fc||0),0);
      document.getElementById('stat-files').textContent=fc||'?';
    }
    function populateFilters(data){
      const cats=[...new Set(data.map(v=>v.cat).filter(Boolean))];
      const sts=[...new Set(data.map(v=>v.status).filter(Boolean))];
      const cs=document.getElementById('cat-filter');
      cats.forEach(c=>{const o=document.createElement('option');
        o.value=c;o.textContent=c;cs.appendChild(o);});
      const ss=document.getElementById('status-filter');
      sts.forEach(s=>{const o=document.createElement('option');
        o.value=s;o.textContent=s;ss.appendChild(o);});
    }
    function updateCheckCount(){
      const cnt=document.querySelectorAll('.row-check:checked').length;
      document.getElementById('selected-count').textContent=cnt+'件選択';
    }
    function getChecked(){
      return[...document.querySelectorAll('.row-check:checked')]
        .map(cb=>cb.dataset.folder);
    }
    function moveToExcluded(){
      getChecked().forEach(f=>manualExcluded.add(f));
      renderTable(vendorData);
    }
    function moveToTarget(){
      getChecked().forEach(f=>manualExcluded.delete(f));
      renderTable(vendorData);
    }
    async function init(){
      const ps=VENDORS.map(async v=>{
        const d=await fetchJSON(
          `../308_vendor_master/${v.j}`)
          ||await fetchJSON(
          `../${v.f}/vendor_detail.json`);
        if(d)return{...d,folder:v.f,no:v.n,jf:v.j,
          fc:getCnt(v.f)};
        return{folder:v.f,no:v.n,jf:v.j,
          name:'読込失敗',
          id:v.j.replace('.json',''),
          status:'エラー',fc:getCnt(v.f)};
      });
      vendorData=await Promise.all(ps);
      updateStats(vendorData);
      populateFilters(vendorData);
      renderTable(vendorData);
      document.getElementById('search').addEventListener('input',
        ()=>renderTable(vendorData));
      document.getElementById('cat-filter').addEventListener('change',
        ()=>renderTable(vendorData));
      document.getElementById('status-filter').addEventListener('change',
        ()=>renderTable(vendorData));
      document.getElementById('check-all').addEventListener('change',e=>{
        document.querySelectorAll('.row-check')
          .forEach(cb=>cb.checked=e.target.checked);
        updateCheckCount();
      });
      document.getElementById('vendor-table').addEventListener('change',e=>{
        if(e.target.classList.contains('row-check'))updateCheckCount();
      });
    }
    init();
  </script>
</body>
</html>
